<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1">

<title>Login - CSO Manager</title>

<link rel="stylesheet" href="assets/style.css">

<style>
.login-card {
    max-width: 350px;
    margin: 80px auto;
    padding: 20px;
    border-radius: 12px;
    background: #1e293b;
    text-align: center;
}

h2 {
    margin-bottom: 15px;
}

input {
    width: 100%;
    padding: 10px;
    margin: 8px 0;
    border-radius: 8px;
    border: none;
}

button {
    width: 100%;
    padding: 10px;
    background: #2563eb;
    color: white;
    border: none;
    border-radius: 8px;
    cursor: pointer;
}

button:hover {
    background: #1d4ed8;
}
</style>

</head>
<body>

<div class="login-card">
    <h2>CSO Manager</h2>

    <input id="userid" placeholder="Employee ID / admin">
    <input id="password" type="password" placeholder="Password (admin only)">

    <button onclick="login()">Login</button>
</div>

<script>

// 🔥 CLEAR OLD SESSION
localStorage.clear();

// 🚀 LOGIN FUNCTION (FINAL FIXED)
function login(){

    let user = document.getElementById("userid").value.trim();
    let pass = document.getElementById("password").value.trim();

    // ❌ EMPTY CHECK
    if(user === ""){
        alert("Please enter Employee ID");
        return;
    }

    // 👑 ADMIN LOGIN (STRICT)
    if(user === "admin"){
        if(pass === "26544479"){
            localStorage.setItem("role", "admin");
            window.location.href = "admin.html";
        } else {
            alert("Admin password required ❌");
        }
        return;
    }

    // 👤 ASE LOGIN (NO PASSWORD)
    localStorage.setItem("role", "user");
    localStorage.setItem("user", user);

    window.location.href = "dashboard.html";
}

</script>

</body>
</html>
